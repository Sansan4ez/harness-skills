version: 1

# Surface registry: YAML-driven enforcement for PR-level contract drift discipline.
# The traceability contract sync checker uses `git diff --name-only` against this registry.

surfaces:
  api_http:
    owner: runtime-api
    summary: "HTTP runtime endpoints, request shaping, and agent execution surface."
    implementation_patterns:
      - main.py
      - src/public_runtime.py
      - src/adk_text_agent/**
    required_alignment_patterns:
      - specs/openapi.yaml
      - docs/requirements/traceability.md
      - tests/**

  compose_topology:
    owner: platform
    summary: "Compose topology changes (services, ports, dependencies)."
    implementation_patterns:
      - docker-compose*.yml
      - docker-compose*.yaml
    required_alignment_patterns:
      - harness/manifest.yaml
      - docs/architecture/c4/l2-containers.md

  env_vars_catalog:
    owner: runtime-config
    summary: "Supported env vars and defaults used by the repo."
    implementation_patterns:
      - .env.example
      - harness/env-vars.yaml
    required_alignment_patterns:
      - docs/generated/env-matrix.md

  telemetry_signals_catalog:
    owner: platform
    summary: "Telemetry signal catalog changes (metrics/logs/traces naming and expectations)."
    implementation_patterns:
      - harness/observability/signals.yaml
    required_alignment_patterns:
      - docs/operations/observability-baseline.md
      - docs/operations/observability-policy.md
      - docs/operations/observability-runbook.md

reserved_categories:
  new_specs:
    owner: runtime-contract
    summary: "New spec artifacts beyond the current OpenAPI surface."
    implementation_patterns:
      - specs/*.yaml
      - specs/**/*.yaml
    ignore_patterns:
      - specs/openapi.yaml
    required_alignment_hint:
      - add a dedicated surface entry to harness/surface-registry.yaml
      - update specs/index.md and docs/requirements/traceability.md
      - add tests and CI coverage
