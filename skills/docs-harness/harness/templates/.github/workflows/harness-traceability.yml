name: Harness Traceability

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  traceability:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout harness skills
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.HARNESS_SKILLS_REPOSITORY }}
          ref: ${{ vars.HARNESS_SKILLS_REF }}
          path: .skills/harness
          token: ${{ secrets.HARNESS_SKILLS_REPO_TOKEN || github.token }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install traceability-harness runtime
        working-directory: .skills/harness/skills/traceability-harness
        run: uv sync

      - name: Harness traceability check
        working-directory: .skills/harness/skills/traceability-harness
        run: uv run python scripts/harness/harness.py --repo-root "$GITHUB_WORKSPACE" --mode check --module traceability

      - name: Traceability harness verify
        working-directory: .skills/harness/skills/traceability-harness
        run: uv run python scripts/harness/traceability/verify.py --repo-root "$GITHUB_WORKSPACE"

      - name: Traceability contract sync (surface registry)
        if: github.event_name == 'pull_request'
        working-directory: .skills/harness/skills/traceability-harness
        run: |
          uv run python scripts/harness/traceability/contract_sync.py \
            --repo-root "$GITHUB_WORKSPACE" \
            --base-ref "${{ github.event.pull_request.base.sha }}" \
            --head-ref "${{ github.sha }}"
