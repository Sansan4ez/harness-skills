version: 1

surfaces:
  api_http:
    owner: fixture
    summary: "Fixture API contract surface."
    implementation_patterns:
      - services/api/**
    required_alignment_patterns:
      - specs/api/openapi.yaml
      - docs/requirements/traceability.md
      - tests/**

  compose_topology:
    owner: fixture
    summary: "Fixture compose topology."
    implementation_patterns:
      - docker-compose*.yml
      - docker-compose*.yaml
    required_alignment_patterns:
      - harness/manifest.yaml
      - docs/architecture/c4/l2-containers.md

  env_vars_catalog:
    owner: fixture
    summary: "Fixture env var catalog."
    implementation_patterns:
      - .env.example
      - harness/env-vars.yaml
    required_alignment_patterns:
      - docs/generated/env-matrix.md

  telemetry_signals_catalog:
    owner: fixture
    summary: "Fixture telemetry signals catalog."
    implementation_patterns:
      - harness/observability/signals.yaml
    required_alignment_patterns:
      - docs/operations/index.md
      - docs/requirements/traceability.md
